<!DOCTYPE html>
<html lang="pt-PT">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Painel Admin | Viva Óptica</title>
 <!-- Tailwind CDN (para desenvolvimento) - Para produção, usar build local: npm install tailwindcss -->
 <script src="https://cdn.tailwindcss.com/3.4.17"></script>
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
 <!-- SortableJS for drag-and-drop -->
 <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
 <!-- Supabase JS Library (local fallback) -->
  <script src="js/libs/supabase.min.js"></script>
  <!-- Chart.js for stats -->
 <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
 <!-- FontAwesome -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
 <!-- Admin Premium CSS -->
 <link rel="stylesheet" href="admin.css">
 <!-- Supabase JS Library -->
 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
 <script>
 tailwind.config = {
 theme: {
 extend: {
 colors: {
 navy: '#0D1B2E',
 cyan: '#00aadc',
 magenta: '#e91e8c',
 yellow: '#f5c800',
 },
 fontFamily: {
 sans: ['Inter', 'sans-serif'],
 }
 }
 }
 }
 </script>
</head>
<body class="bg-gray-50">
 <div class="flex h-screen overflow-hidden">

 <!-- Sidebar -->
 <aside id="sidebar" class="admin-sidebar w-64 text-white flex-shrink-0 hidden md:flex flex-col">
 <div class="p-6 border-b border-white/10 text-center">
 <img src="../Logo/viva_logo_branco.jpeg" alt="Viva Óptica Logo" class="h-12 mx-auto mb-3 bg-white rounded-xl p-2 shadow-sm">
 <p class="text-xs text-gray-400 font-medium tracking-wider uppercase">Painel Admin</p>
 </div>

 <nav class="flex-1 overflow-y-auto py-4">
 <a href="#" data-section="dashboard" class="sidebar-item sidebar-active flex items-center px-6 py-3 text-sm transition-colors">
  <i class="fa-solid fa-chart-line w-6 text-cyan"></i>
  <span class="ml-3 font-medium">Dashboard</span>
 </a>
 <a href="#" data-section="agendamentos" class="sidebar-item flex items-center px-6 py-3 text-sm transition-colors">
  <i class="fa-solid fa-calendar-check w-6"></i>
  <span class="ml-3 font-medium">Agendamentos</span>
 </a>
 <a href="#" data-section="produtos" class="sidebar-item flex items-center px-6 py-3 text-sm transition-colors">
  <i class="fa-solid fa-box w-6"></i>
  <span class="ml-3 font-medium">Produtos</span>
 </a>
 <a href="#" data-section="clientes" class="sidebar-item flex items-center px-6 py-3 text-sm transition-colors">
  <i class="fa-solid fa-users w-6"></i>
  <span class="ml-3 font-medium">Clientes</span>
 </a>
 <a href="#" data-section="configuracoes" class="sidebar-item flex items-center px-6 py-3 text-sm transition-colors">
  <i class="fa-solid fa-cog w-6"></i>
  <span class="ml-3 font-medium">Configurações</span>
 </a>
 <a href="#" data-section="slideshow" class="sidebar-item flex items-center px-6 py-3 text-sm transition-colors">
  <i class="fa-solid fa-images w-6"></i>
  <span class="ml-3 font-medium">Slideshow</span>
 </a>
 <a href="#" data-section="paginas" class="sidebar-item flex items-center px-6 py-3 text-sm transition-colors">
  <i class="fa-solid fa-file-alt w-6"></i>
  <span class="ml-3 font-medium">Páginas</span>
 </a>
 </nav>

 <div class="p-4 border-t border-white/10">
 <button id="logout-btn" class="w-full flex items-center justify-center px-4 py-2.5 bg-red-600/90 hover:bg-red-600 text-white rounded-xl transition-all text-sm font-medium">
  <i class="fa-solid fa-sign-out-alt mr-2"></i>
  <span>Sair</span>
 </button>
 </div>
 </aside>

 <!-- Main Content -->
 <div class="flex-1 flex flex-col overflow-hidden">
 <!-- Top Header -->
 <header class="admin-header px-6 py-4 flex items-center justify-between">
 <div class="flex items-center">
 <button id="mobile-menu-btn" class="md:hidden text-gray-600 mr-4 hover:text-gray-800 transition-colors">
  <i class="fa-solid fa-bars text-xl"></i>
 </button>
 <h2 id="page-title" class="text-xl font-bold text-gray-800 tracking-tight">Dashboard</h2>
 </div>
 <div class="flex items-center space-x-4">
 <span id="admin-email" class="text-sm text-gray-500 hidden sm:inline font-medium"></span>
 <button onclick="toggleNotifications()" class="relative text-gray-500 hover:text-gray-700 transition-colors p-2 hover:bg-gray-100 rounded-xl">
  <i class="fa-regular fa-bell text-lg"></i>
  <span id="notification-badge" class="absolute -top-0.5 -right-0.5 bg-magenta text-white text-xs w-5 h-5 rounded-full flex items-center justify-center hidden font-bold shadow-sm">0</span>
 </button>
 <div id="user-avatar" class="w-9 h-9 bg-gradient-to-br from-cyan to-cyan/80 rounded-xl flex items-center justify-center text-white font-bold text-sm shadow-sm"></div>
 </div>
 </header>

 <!-- Main Content Area -->
 <main id="main-content" class="flex-1 overflow-y-auto admin-main-bg">
 <!-- Content will be dynamically inserted here -->
 </main>
 </div>
 </div>

 <!-- Notification Toast Container -->
 <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

 <!-- Mobile Menu Overlay -->
 <div id="mobile-menu-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden"></div>

 <script src="supabaseClient.js"></script>
 <script src="app.js"></script>
</body>
</html>
