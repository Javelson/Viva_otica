<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://cdn.tailwindcss.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: blob: https:; connect-src 'self' https://cdn.jsdelivr.net https://ppvdqrhhcmeqssazgpnd.supabase.co wss://ppvdqrhhcmeqssazgpnd.supabase.co; frame-src 'none';">
    <title>Login - Admin Viva Óptica</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#0D1B2E',
                        cyan: '#00aadc',
                        magenta: '#e91e8c',
                        yellow: '#f5c800',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-navy via-navy to-cyan/20 min-h-screen flex items-center justify-center p-4">
    <!-- Decorative background elements -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-1/4 -left-32 w-96 h-96 bg-cyan/5 rounded-full blur-3xl"></div>
        <div class="absolute bottom-1/4 -right-32 w-96 h-96 bg-magenta/5 rounded-full blur-3xl"></div>
    </div>

    <div class="max-w-md w-full relative z-10">
        <!-- Logo -->
        <div class="text-center mb-8 animate-slide-up">
            <div class="bg-white/10 backdrop-blur-sm rounded-2xl p-6 inline-block shadow-2xl border border-white/10">
                <img src="../Logo/viva_logo_branco.jpeg"
                    alt="Viva Óptica"
                    class="h-16 mx-auto"
                    onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22150%22 height=%2260%22 viewBox=%220 0 150 60%22%3E%3Crect fill=%22%230D1B2E%22 width=%22150%22 height=%2260%22/%3E%3Ctext fill=%22%23FFFFFF%22 font-family=%22Arial%22 font-size=%2214%22 x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22%3EViva Óptica%3C/text%3E%3C/svg%3E';">
            </div>
            <h1 class="text-3xl font-bold text-white mt-6 tracking-tight">Painel Admin</h1>
            <p class="text-gray-400 mt-2 text-sm">Aceda à sua conta para continuar</p>
        </div>

        <!-- System Status Alert -->
        <div id="system-status-alert" class="hidden mb-6 p-4 rounded-xl border transition-all duration-300 animate-fade-in">
            <div class="flex items-start">
                <i id="status-icon" class="fa-solid fa-circle-info mt-1 mr-3 text-xl"></i>
                <div class="flex-1">
                    <h3 id="status-title" class="font-bold mb-1"></h3>
                    <p id="status-message" class="text-sm"></p>
                    <button id="status-close" class="mt-2 text-xs px-3 py-1 rounded-lg bg-opacity-20 hover:bg-opacity-30 transition-colors">
                        Fechar
                    </button>
                </div>
            </div>
        </div>

        <!-- Login Form Card with Glassmorphism -->
        <div class="admin-login-card p-8">
            <form id="login-form" class="space-y-5">
                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fa-solid fa-envelope mr-2 text-cyan"></i>Email
                    </label>
                    <input type="email"
                        id="email"
                        required
                        placeholder="admin@vivaoptica.com"
                        class="admin-input">
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fa-solid fa-lock mr-2 text-cyan"></i>Palavra-passe
                    </label>
                    <input type="password"
                        id="password"
                        required
                        placeholder="••••••••"
                        class="admin-input">
                </div>

                <!-- Error Message -->
                <div id="error-message" class="hidden bg-red-50 border border-red-200 rounded-xl p-4">
                    <div class="flex items-center">
                        <i class="fa-solid fa-exclamation-circle text-red-500 mr-2"></i>
                        <p id="error-text" class="text-sm text-red-700"></p>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit"
                    id="login-btn"
                    class="w-full admin-btn-primary py-3 text-base shadow-lg hover:shadow-xl">
                    <i class="fa-solid fa-sign-in-alt mr-2"></i>
                    Entrar
                </button>
            </form>

            <!-- Loading -->
            <div id="loading" class="hidden text-center py-4">
                <div class="animate-spin rounded-full h-8 w-8 border-4 border-cyan border-t-transparent mx-auto"></div>
                <p class="text-gray-600 mt-3 text-sm">A verificar credenciais...</p>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-gray-500 text-sm mt-6 animate-fade-in">
            © 2026 Viva Óptica. Todos os direitos reservados.
        </p>
    </div>

    <!-- ============================================ -->
    <!-- SCRIPTS - ORDEM CRÍTICA E OBRIGATÓRIA -->
    <!-- ============================================ -->

    <!-- 1. SDK SUPABASE (CDN) - DEVE VIR PRIMEIRO -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- 2. SUPABASE CLIENT - Inicializa e expõe window.supabase -->
    <script src="supabaseClient.js"></script>

<!-- 3. LOGIN HANDLER -->
<script>
document.addEventListener('DOMContentLoaded', async () => {
    console.log('🔐 [LOGIN] Inicializando...');

    // Esperar supabase estar pronto
    let supabase = null;
    let attempts = 0;
    const maxAttempts = 10;

    while (!supabase && attempts < maxAttempts) {
        if (typeof window.getSupabase === 'function') {
            supabase = await window.getSupabase();
        }
        if (!supabase) {
            attempts++;
            await new Promise(resolve => setTimeout(resolve, 500));
        }
    }

    if (!supabase) {
        console.error('❌ [LOGIN] Supabase não disponível');
        alert('Erro: Supabase não disponível. Recarregue a página.');
        return;
    }

    console.log('✅ [LOGIN] Supabase pronto');

    // Verificar sessão ativa
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
        window.location.href = 'index.html';
        return;
    }

    // Setup form
    const form = document.getElementById('login-form');
    const btn = document.getElementById('login-btn');
    const loading = document.getElementById('loading');
    const errorMsg = document.getElementById('error-message');
    const errorText = document.getElementById('error-text');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        errorMsg.classList.add('hidden');
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> A entrar...';
        loading.classList.remove('hidden');

        try {
            const { data, error } = await supabase.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                throw error;
            }

            // Verificar role
            const { data: profile, error: profileError } = await supabase
                .from('profiles')
                .select('role')
                .eq('id', data.user.id)
                .single();

            if (profileError || !['admin', 'superadmin'].includes(profile.role)) {
                await supabase.auth.signOut();
                throw new Error('Acesso negado: apenas administradores');
            }

            window.location.href = 'index.html';

        } catch (err) {
            console.error('❌ [LOGIN]', err.message);
            errorText.textContent = err.message;
            errorMsg.classList.remove('hidden');
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-sign-in-alt mr-2"></i> Entrar';
            loading.classList.add('hidden');
        }
    });
});

function showStatusAlert(type, title, message) {
    const alert = document.createElement('div');
    alert.className = 'p-4 mb-4 rounded-xl bg-red-100 border border-red-400 text-red-700 animate-fade-in';
    alert.innerHTML = `<strong>${title}</strong><br>${message}`;
    const container = document.querySelector('.max-w-md');
    if (container) {
        container.insertBefore(alert, container.firstChild);
        setTimeout(() => alert.remove(), 10000);
    }
}
</script>
</body>
</html>
