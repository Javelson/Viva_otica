<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Produtos | Viva Óptica</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
</head>
<body class="bg-gray-100">
    <div class="max-w-4xl mx-auto p-8">
        <h1 class="text-3xl font-bold mb-6 text-navy" style="color: #1a2a4a;">🔍 Teste de Produtos</h1>
        
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">Status do Supabase</h2>
            <div id="status" class="space-y-2">
                <p>Verificando conexão...</p>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-lg p-6">
            <h2 class="text-xl font-semibold mb-4">Produtos Carregados</h2>
            <button onclick="loadProdutos()" class="bg-cyan-500 text-white px-6 py-2 rounded-lg mb-4 hover:bg-cyan-600">
                Carregar Produtos
            </button>
            <div id="products" class="space-y-4"></div>
        </div>
    </div>

    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabaseClient.js"></script>

    <script>
        // Check Supabase connection
        async function checkSupabase() {
            const status = document.getElementById('status');
            
            // Wait for Supabase to initialize
            let attempts = 0;
            let supabase = null;
            
            while (!supabase && attempts < 10) {
                supabase = window.supabase;
                if (!supabase) {
                    await new Promise(r => setTimeout(r, 500));
                    attempts++;
                }
            }

            if (!supabase || typeof supabase.from !== 'function') {
                status.innerHTML = '<p class="text-red-600">❌ Cliente Supabase não inicializado</p>';
                return;
            }

            status.innerHTML = '<p class="text-green-600">✅ Cliente Supabase inicializado</p>';
            
            // Try to fetch a sample count
            try {
                const { count, error } = await supabase
                    .from('produtos')
                    .select('*', { count: 'exact' });
                
                if (error) {
                    status.innerHTML += '<p class="text-red-600">❌ Erro ao acessar tabela: ' + error.message + '</p>';
                } else {
                    status.innerHTML += '<p class="text-green-600">✅ Tabela "produtos" acessível</p>';
                }
            } catch (err) {
                status.innerHTML += '<p class="text-red-600">❌ Erro: ' + err.message + '</p>';
            }
        }

        // Load and display products
        async function loadProdutos() {
            const container = document.getElementById('products');
            container.innerHTML = '<p class="text-gray-600">Carregando produtos...</p>';

            let supabase = window.supabase;
            if (!supabase) {
                container.innerHTML = '<p class="text-red-600">❌ Supabase não disponível</p>';
                return;
            }

            try {
                const { data, error } = await supabase
                    .from('produtos')
                    .select('*')
                    .order('criado_em', { ascending: false });

                if (error) {
                    container.innerHTML = '<p class="text-red-600">❌ Erro: ' + error.message + '</p>';
                    return;
                }

                if (!data || data.length === 0) {
                    container.innerHTML = '<p class="text-amber-600">⚠️ Nenhum produto encontrado. Execute o SQL em insert-sample-products.sql</p>';
                    return;
                }

                let html = '';
                data.forEach(p => {
                    html += `
                        <div class="border border-gray-300 rounded-lg p-4">
                            <h3 class="font-semibold text-lg">${p.nome}</h3>
                            <p class="text-gray-600">Categoria: <strong>${p.categoria || 'N/A'}</strong></p>
                            <p class="text-gray-600">Preço: <strong>${p.preco} Kz</strong></p>
                            <p class="text-gray-600">Estoque: <strong>${p.estoque}</strong></p>
                            <p class="text-gray-600">Status: ${p.ativo ? '✅ Ativo' : '⚠️ Inativo'}</p>
                        </div>
                    `;
                });
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = '<p class="text-red-600">❌ Erro: ' + err.message + '</p>';
            }
        }

        // Initialize on page load
        window.addEventListener('load', checkSupabase);
    </script>
</body>
</html>
